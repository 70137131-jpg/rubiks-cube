<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Canvas</title>
    <link rel="manifest" href="/static/manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cubejs/1.2.2/cube.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070709;
            --surface: rgba(22, 22, 28, 0.7);
            --surface-border: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #8b8d98;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 80vw; height: 80vh;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(139,92,246,0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Sleek Sidebar */
        #ui-layer {
            position: absolute;
            top: 32px;
            left: 32px;
            bottom: 32px;
            width: 340px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--surface-border);
            border-radius: 28px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 40px 32px;
            box-sizing: border-box;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            margin: 0 0 12px 0;
            letter-spacing: -0.03em;
            color: #fff;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 40px 0;
        }

        .progress-container {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-count {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            color: var(--accent);
            font-weight: 700;
        }

        .progress-count span {
            color: var(--text-muted); 
            font-size: 1rem; 
            font-weight: 500;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 11%; /* (6/54)*100 */
            background: linear-gradient(90deg, var(--accent), #c4b5fd);
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
        }

        .palette-section {
            flex-grow: 1;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .colors-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .color-btn {
            aspect-ratio: 1;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: none;
        }

        .color-btn::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            border: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .color-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.2), inset 0 -2px 10px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        .color-btn.active::before {
            border-color: #fff;
        }

        .color-btn.active {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4), 0 0 15px rgba(255,255,255,0.15);
        }

        .color-btn:hover {
            transform: scale(1.05);
        }

        .color-btn.active:hover {
            transform: scale(1.08);
        }

        .lock-note {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.25);
            text-align: center;
            margin-top: 40px;
            font-weight: 500;
        }

        .action-btn {
            margin-top: 24px;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: #ffffff;
            color: #000000;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
            opacity: 0.6; /* Increased slightly so it's visible */
        }

        .action-btn.ready {
            opacity: 1;
        }

        .action-btn.ready:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.3);
        }
        
        .action-btn.ready:active {
            transform: translateY(0);
        }

        .reset-paint-btn {
            margin-top: 12px;
            width: 100%;
            padding: 13px 16px;
            border-radius: 14px;
            background: transparent;
            color: #f87171;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid rgba(248, 113, 113, 0.25);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .reset-paint-btn:hover {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.5);
            transform: translateY(-1px);
        }
        .reset-paint-btn:active {
            transform: translateY(0);
        }

        .randomize-btn {
            margin-top: 12px;
            width: 100%;
            padding: 13px 16px;
            border-radius: 14px;
            background: transparent;
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid rgba(139, 92, 246, 0.35);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .randomize-btn:hover {
            background: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.65);
            box-shadow: 0 0 18px rgba(139, 92, 246, 0.2);
            transform: translateY(-1px);
        }
        .randomize-btn:active {
            transform: translateY(0);
        }
        .randomize-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Cool Patterns UI */
        .patterns-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .patterns-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pattern-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .pattern-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent);
            padding-left: 16px;
        }

        /* Elegant Player UI */
        #player-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 100px;
            padding: 14px 28px;
            z-index: 20;
            display: none; /* Flex when active */
            align-items: center;
            gap: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            opacity: 0;
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #player-panel.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .move-display {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            min-width: 140px;
            text-align: center;
            font-weight: 700;
        }

        .player-controls {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 0 28px;
            border-left: 1px solid rgba(255,255,255,0.08);
            border-right: 1px solid rgba(255,255,255,0.08);
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s, transform 0.2s;
            padding: 8px;
        }

        .ctrl-btn:hover { color: #fff; transform: translateY(-1px); }
        .ctrl-btn:active { transform: translateY(1px); }
        
        .ctrl-btn.play { 
            color: var(--accent); 
            font-size: 1rem;
            font-weight: 700;
        }
        .ctrl-btn.play:hover { color: var(--accent-hover); }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .speed-label-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .speed-val { 
            font-size: 0.9rem; 
            font-family: 'Space Grotesk', sans-serif; 
            font-weight: 500;
            width: 35px;
            color: #fff;
        }

        /* Minimalist Toast */
        .toast {
            position: absolute;
            top: 40px;
            right: 40px;
            background: #e11d48;
            color: white;
            padding: 16px 28px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0;
            transform: translateX(20px);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 100;
            box-shadow: 0 15px 35px rgba(225, 29, 72, 0.25);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(7, 7, 9, 0.85);
            backdrop-filter: blur(12px);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top-color: var(--accent);
            border-right-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .reset-link {
            position: absolute;
            top: 40px;
            right: 40px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
            z-index: 15;
            display: none;
            padding: 12px 24px;
            border-radius: 100px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .reset-link:hover { 
            color: #fff; 
            background: rgba(255,255,255,0.08);
        }

        /* Camera Snap Controls */
        .camera-snaps {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .snap-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(22, 22, 28, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .snap-btn:hover {
            color: #fff;
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.5);
            transform: scale(1.15);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
        }
        
        .snap-btn:active {
            transform: scale(0.95);
        }

        /* ============ MOBILE: Toggle Button (hidden on desktop) ============ */
        #mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: rgba(18, 18, 24, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 12px 22px;
            gap: 10px;
            align-items: center;
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            transition: background 0.2s, transform 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #mobile-toggle:active {
            transform: translateX(-50%) scale(0.96);
        }
        #mobile-toggle .toggle-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            transition: background 0.3s;
        }
        #mobile-toggle.open .toggle-dot {
            background: #f87171;
            box-shadow: 0 0 8px #f87171;
        }

        /* Mobile drawer panel — hidden on desktop, slides in from top on mobile */
        #mobile-drawer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 25;
            background: rgba(12, 12, 18, 0.96);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            border-radius: 0 0 28px 28px;
            flex-direction: column;
            padding: 24px 24px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            transform: translateY(-110%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #mobile-drawer.open {
            transform: translateY(0);
        }
        #mobile-drawer .drawer-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }
        #mobile-drawer .drawer-sub {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 18px;
        }
        #mobile-drawer .drawer-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        #mobile-drawer .drawer-progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.07);
            border-radius: 3px;
            overflow: hidden;
        }
        #mobile-drawer .drawer-progress-fill {
            height: 100%;
            width: 11%;
            background: linear-gradient(90deg, var(--accent), #c4b5fd);
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 8px rgba(139,92,246,0.4);
        }
        #mobile-drawer .drawer-count {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
        }
        #mobile-drawer .drawer-colors {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        #mobile-drawer .drawer-color-btn {
            aspect-ratio: 1;
            border-radius: 14px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        #mobile-drawer .drawer-color-btn.active {
            border-color: #fff;
            transform: scale(1.15);
        }
        #mobile-drawer .drawer-solve-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: #fff;
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            transition: all 0.3s;
            opacity: 0.6;
        }
        #mobile-drawer .drawer-solve-btn.ready {
            opacity: 1;
        }
        #mobile-drawer .drawer-solve-btn.ready:active {
            transform: scale(0.97);
        }
        #mobile-drawer .drawer-handle {
            width: 36px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin: 10px auto 0;
        }

        /* Mobile-scoped reset button inside the drawer */
        #mobile-drawer .reset-paint-btn {
            margin-top: 10px;
            padding: 12px 14px;
            font-size: 0.88rem;
            border-radius: 12px;
        }

        /* ============ MOBILE BREAKPOINT ============ */
        @media (max-width: 768px) {
            /* Hide desktop sidebar */
            #ui-layer {
                display: none !important;
            }
            /* Show the floating toggle pill */
            #mobile-toggle {
                display: flex !important;
            }
            /* Show the drawer panel (starts off-screen via transform) */
            #mobile-drawer {
                display: flex !important;
            }

            /* Camera snaps adjustment for mobile */
            .camera-snaps {
                right: 16px;
                gap: 8px;
            }
            .snap-btn {
                width: 38px;
                height: 38px;
                font-size: 0.8rem;
            }

            /* ---- Solving screen: player panel ---- */
            #player-panel {
                bottom: 0;
                left: 0;
                right: 0;
                transform: translateY(100%);
                border-radius: 28px 28px 0 0;
                flex-direction: column;
                align-items: stretch;
                gap: 0;
                padding: 24px 24px 36px;
                width: auto;
            }
            #player-panel.active {
                transform: translateY(0);
            }

            .move-display {
                font-size: 1.5rem;
                min-width: unset;
                text-align: center;
                padding-bottom: 18px;
                border-bottom: 1px solid rgba(255,255,255,0.07);
                margin-bottom: 18px;
            }

            .player-controls {
                border-left: none;
                border-right: none;
                justify-content: center;
                gap: 0;
                padding: 0 0 18px 0;
                border-bottom: 1px solid rgba(255,255,255,0.07);
                margin-bottom: 18px;
            }

            .ctrl-btn {
                flex: 1;
                padding: 14px 8px;
                font-size: 1rem;
                letter-spacing: 0.06em;
                border-radius: 12px;
            }
            .ctrl-btn.play {
                font-size: 1.1rem;
            }

            .speed-control {
                justify-content: space-between;
                width: 100%;
                gap: 12px;
            }
            input[type="range"] {
                flex: 1;
                width: auto;
            }

            /* Start Fresh: top-center, clear of the player panel */
            .reset-link {
                position: fixed;
                top: 20px;
                right: auto;
                left: 50%;
                bottom: auto;
                transform: translateX(-50%);
                white-space: nowrap;
                z-index: 30;
                font-size: 0.85rem;
                padding: 10px 20px;
            }

            /* Toast: bottom-center on mobile */
            .toast {
                top: auto;
                bottom: 20px;
                right: auto;
                left: 50%;
                transform: translateX(calc(-50% + 20px));
            }
            .toast.show {
                transform: translateX(-50%);
            }
        }

    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="camera-snaps">
        <button class="snap-btn" data-face="U" title="Top Face">U</button>
        <button class="snap-btn" data-face="D" title="Bottom Face">D</button>
        <button class="snap-btn" data-face="F" title="Front Face">F</button>
        <button class="snap-btn" data-face="B" title="Back Face">B</button>
        <button class="snap-btn" data-face="L" title="Left Face">L</button>
        <button class="snap-btn" data-face="R" title="Right Face">R</button>
    </div>

    <!-- Mobile: floating toggle button -->
    <button id="mobile-toggle" onclick="toggleMobileDrawer()">
        <span class="toggle-dot"></span>
        <span id="mobile-toggle-label">Paint Colors</span>
    </button>

    <!-- Mobile: slide-down drawer -->
    <div id="mobile-drawer">
        <div class="drawer-title">Cube Canvas</div>
        <div class="drawer-sub">Tap a color, then tap a tile on the cube to paint it.</div>
        <div class="drawer-progress">
            <div class="drawer-progress-bar">
                <div class="drawer-progress-fill" id="mobile-progress-fill"></div>
            </div>
            <div class="drawer-count"><span id="mobile-painted-count">6</span>/54</div>
        </div>
        <div class="drawer-colors">
            <div class="drawer-color-btn active" data-color="W" style="background:#FFFFFF"></div>
            <div class="drawer-color-btn" data-color="Y" style="background:#FFD500"></div>
            <div class="drawer-color-btn" data-color="G" style="background:#009E60"></div>
            <div class="drawer-color-btn" data-color="B" style="background:#0051BA"></div>
            <div class="drawer-color-btn" data-color="O" style="background:#FF5800"></div>
            <div class="drawer-color-btn" data-color="R" style="background:#C41E3A"></div>
        </div>
        <button id="mobile-solve-btn" class="drawer-solve-btn">Solve Cube</button>
        <button id="mobile-randomize-btn" class="randomize-btn">🎲 Randomize</button>
        <button id="mobile-reset-paint-btn" class="reset-paint-btn">↺ Reset to Start</button>
        
        <div class="patterns-section" style="margin-top: 16px; padding-top: 16px;">
            <div class="section-title" style="margin-bottom: 12px;">Cool Patterns</div>
            <div class="patterns-grid">
                <button class="pattern-btn" data-pattern="M2 E2 S2">Checkerboard</button>
                <button class="pattern-btn" data-pattern="U R2 F B R B2 R U2 L B2 R U' D' R2 F R' L B2 U2 F2">Superflip</button>
                <button class="pattern-btn" data-pattern="F L F U' R U F2 L2 U' L' B D' B' L2 U">Cube in a Cube</button>
            </div>
        </div>

        <div class="drawer-handle"></div>
    </div>

    <div id="ui-layer">
        <div class="header">
            <h1>Cube Canvas</h1>
            <p>Drag to orbit the space. Tap any structural tile to apply pigment.</p>
        </div>

        <div class="progress-container">
            <div class="progress-header">
                <span class="progress-label">Reconstruction</span>
                <span class="progress-count" id="painted-count">6<span>/54</span></span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
        </div>

        <div class="palette-section">
            <div class="section-title">Active Pigment</div>
            <div class="colors-grid">
                <div class="color-btn active" data-color="W" style="background: #FFFFFF;"></div>
                <div class="color-btn" data-color="Y" style="background: #FFD500;"></div>
                <div class="color-btn" data-color="G" style="background: #009E60;"></div>
                <div class="color-btn" data-color="B" style="background: #0051BA;"></div>
                <div class="color-btn" data-color="O" style="background: #FF5800;"></div>
                <div class="color-btn" data-color="R" style="background: #C41E3A;"></div>
            </div>
            <div class="lock-note">Core centers are structurally locked.</div>
            
            <button id="trigger-solve-btn" class="action-btn">Solve Cube</button>
            <button id="randomize-btn" class="randomize-btn">🎲 Randomize</button>
            <button id="reset-paint-btn" class="reset-paint-btn">↺ Reset to Start</button>

            <div class="patterns-section">
                <div class="section-title">Cool Patterns</div>
                <div class="patterns-grid">
                    <button class="pattern-btn" data-pattern="M2 E2 S2">Checkerboard</button>
                    <button class="pattern-btn" data-pattern="U R2 F B R B2 R U2 L B2 R U' D' R2 F R' L B2 U2 F2">Superflip</button>
                    <button class="pattern-btn" data-pattern="F L F U' R U F2 L2 U' L' B D' B' L2 U">Cube in a Cube</button>
                </div>
            </div>
        </div>
    </div>

    <div id="player-panel">
        <div class="move-display" id="current-move-text">Analyzing</div>
        
        <div class="player-controls">
            <button id="prev-move-btn" class="ctrl-btn">Prev</button>
            <button id="play-pause-btn" class="ctrl-btn play">Play</button>
            <button id="next-move-btn" class="ctrl-btn">Next</button>
        </div>

        <div class="speed-control">
            <span class="speed-label-text">Speed</span>
            <input type="range" id="speed-slider" min="0.25" max="3" step="0.25" value="1">
            <span class="speed-val" id="speed-label">1.0x</span>
        </div>
    </div>

    <a href="#" class="reset-link" id="reset-btn" onclick="location.reload()">Start Fresh</a>

    <div class="toast" id="toast"></div>

    <div id="loading-overlay">
        <div class="loader"></div>
    </div>

    <script src="/static/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
